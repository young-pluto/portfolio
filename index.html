<head>

  <style>
    /* ============ TOKENS — Claude theme ============ */
    :root {
      color-scheme: light;
      --bg: #faf9f5;
      /* warm cream page */
      --card: #ffffff;
      /* surfaces */
      --text: #191816;
      --text-soft: #57524a;
      --muted: #6b6459;
      --accent: #d97757;
      /* terracotta — dots, big numbers, graphics */
      --accent-ink: #b8542e;
      /* darker terracotta for text links */
      --border: #e3ddd0;
      --border-strong: #d0c8b6;
      --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .dark {
      color-scheme: dark;
      --bg: #191816;
      --card: #22201e;
      --text: #e8e4db;
      --text-soft: #c6c0b2;
      --muted: #a19a8c;
      --accent: #d97757;
      --accent-ink: #e08b6d;
      --border: #33302b;
      --border-strong: #4a463f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 17px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    ::selection {
      background: rgba(217, 119, 87, 0.25);
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 28px;
    }

    a {
      color: var(--accent-ink);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    button {
      font: inherit;
      background: none;
      border: none;
      cursor: pointer;
      color: inherit;
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 2px;
    }

    /* ============ HEADER — compact, no hero ============ */
    .site-header {
      padding: 60px 0 44px;
    }

    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .site-header h1 {
      font-size: 2.1rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .theme-toggle {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      margin-top: 8px;
      white-space: nowrap;
    }

    .theme-toggle:hover {
      color: var(--text);
      border-color: var(--border-strong);
    }

    .positioning {
      margin-top: 10px;
      max-width: 56ch;
      font-size: 1.1rem;
      color: var(--text-soft);
    }

    .site-links {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .site-links a {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 15px;
      font-size: 0.875rem;
      font-weight: 500;
      line-height: 1.2;
    }

    .site-links a:hover {
      text-decoration: none;
      border-color: var(--accent);
    }

    /* ============ PROJECT SECTIONS ============ */
    .section-label {
      display: flex;
      align-items: center;
      gap: 14px;
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 40px 0 16px;
    }

    .section-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    main>section:first-of-type .section-label {
      margin-top: 0;
    }

    .projects {
      list-style: none;
      display: grid;
      gap: 16px;
      align-items: start;
    }

    .projects.misc {
      grid-template-columns: 1fr 1fr;
    }

    .project {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 30px;
      box-shadow: 0 1px 2px rgba(25, 24, 22, 0.04), 0 12px 28px -18px rgba(25, 24, 22, 0.14);
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background-color 0.2s ease;
    }

    .project:hover {
      border-color: var(--border-strong);
      box-shadow: 0 2px 4px rgba(25, 24, 22, 0.05), 0 20px 40px -20px rgba(25, 24, 22, 0.22);
    }

    .featured .project {
      padding: 32px 34px;
    }

    /* --- Tier 1: scan layer --- */
    .scan-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }

    .scan-grid.has-metric {
      grid-template-columns: 1fr auto;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .eyebrow .status-live {
      color: var(--accent-ink);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .eyebrow .status-live::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .eyebrow .tag {
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 8px;
      font-weight: 600;
    }

    .eyebrow .sep {
      color: var(--border);
    }

    .scan-main h3 {
      font-size: 1.45rem;
      font-weight: 750;
      letter-spacing: -0.02em;
      line-height: 1.25;
    }

    .misc .scan-main h3 {
      font-size: 1.2rem;
    }

    /* Labeled story blocks: business context vs. what was built */
    .story-block {
      margin-top: 16px;
    }

    .story-label {
      display: block;
      font-family: var(--mono);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .problem {
      color: var(--text-soft);
    }

    .impact {
      font-weight: 600;
    }

    /* Engineering tease — one line that sells the deep dive */
    .deep-tease {
      display: block;
      text-align: left;
      font-family: var(--mono);
      font-size: 0.78rem;
      line-height: 1.6;
      color: var(--muted);
      margin-top: 18px;
      padding: 0;
    }

    .deep-tease .tease-cta {
      color: var(--accent-ink);
      font-weight: 600;
      white-space: nowrap;
    }

    .deep-tease:hover .tease-cta {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .metric-stat {
      border-left: 1px solid var(--border);
      padding-left: 30px;
      min-width: 160px;
      max-width: 200px;
    }

    .metric-stat .metric-value {
      display: block;
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1.05;
      letter-spacing: -0.03em;
      white-space: nowrap;
    }

    .metric-stat .metric-label {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 500;
      margin-top: 8px;
      max-width: 18ch;
    }

    /* --- Actions --- */
    .row-actions {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill {
      font-family: var(--mono);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.8rem;
      font-weight: 500;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    a.pill:hover {
      text-decoration: none;
    }

    .live-link {
      background: var(--text);
      border-color: var(--text);
      color: var(--bg);
      font-weight: 600;
    }

    .live-link:hover {
      opacity: 0.88;
    }

    .live-none {
      color: var(--muted);
      font-size: 0.875rem;
    }

    .repo-link {
      color: var(--accent-ink);
    }

    .repo-link:hover {
      border-color: var(--accent);
    }

    .toggle {
      color: var(--text);
      border-color: var(--border-strong);
      background: none;
    }

    .toggle:hover {
      color: var(--accent-ink);
      border-color: var(--accent);
    }

    .toggle .chev {
      display: inline-block;
      transition: transform 0.15s ease;
      font-size: 0.9em;
      color: var(--accent-ink);
    }

    .toggle[aria-expanded="true"] .chev {
      transform: rotate(90deg);
    }

    /* --- Tier 2 & 3: collapsed by default, opened only by explicit click ---
     (No hover-reveal: it made the toggle buttons feel dead and the layout jumpy.) */
    .tier2,
    .tier3 {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.18s ease;
    }

    .tier2>.tier-inner,
    .tier3>.tier-inner {
      overflow: hidden;
      visibility: hidden;
      transition: visibility 0s 0.18s;
    }

    .project.t2-open .tier2,
    .project.t3-open .tier3 {
      grid-template-rows: 1fr;
    }

    .project.t2-open .tier2>.tier-inner,
    .project.t3-open .tier3>.tier-inner {
      visibility: visible;
      transition: visibility 0s;
    }

    .tier2 .tier-body {
      padding-top: 18px;
    }

    .tier3 .tier-body {
      padding-top: 20px;
    }

    .tier-heading {
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .tier2 .tier-block+.tier-block {
      margin-top: 16px;
    }

    /* Tech stack */
    .stack {
      display: grid;
      gap: 6px;
    }

    .stack>div {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 12px;
      align-items: baseline;
    }

    .stack dt {
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stack dd {
      font-size: 0.95rem;
    }

    /* Meta line (role / status) */
    .meta-line {
      margin-top: 16px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    /* --- Tier 3: diagram + learnings --- */
    /* Diagrams are drawn on the warm light palette — keep their panel cream in both themes */
    .diagram-figure {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      background: #faf9f5;
    }

    .diagram-figure svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .diagram-caption {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-top: 10px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .fullscreen-btn {
      color: var(--accent-ink);
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 500;
    }

    .fullscreen-btn:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .learnings {
      margin-top: 20px;
    }

    .learnings ul {
      list-style: none;
      display: grid;
      gap: 12px;
    }

    .learnings li {
      padding-left: 16px;
      border-left: 2px solid var(--border);
    }

    .learnings strong {
      font-weight: 650;
    }

    /* ============ FOOTER ============ */
    .site-footer {
      padding: 40px 0 56px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .site-footer p {
      font-family: var(--mono);
      font-size: 0.78rem;
    }

    .site-footer .links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    /* ============ FULL-SCREEN DIAGRAM DIALOG ============ */
    /* Dialog stays light in both themes — the diagrams are drawn for a light surface */
    dialog.diagram-dialog {
      border: none;
      padding: 0;
      width: 100vw;
      height: 100dvh;
      max-width: 100vw;
      max-height: 100dvh;
      background: #faf9f5;
      color: #191816;
    }

    dialog.diagram-dialog::backdrop {
      background: rgba(25, 24, 22, 0.5);
    }

    .dialog-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid #e3ddd0;
    }

    .dialog-title {
      font-weight: 650;
      font-size: 1rem;
    }

    .dialog-close {
      color: #6b6459;
      font-size: 0.9rem;
      font-family: var(--mono);
      font-weight: 500;
    }

    .dialog-close:hover {
      color: #191816;
    }

    .dialog-body {
      overflow: auto;
      height: calc(100dvh - 53px);
      padding: 20px;
    }

    .dialog-body svg {
      display: block;
      min-width: 760px;
      width: 100%;
      height: auto;
      margin: 0 auto;
      max-width: 1100px;
    }

    .dialog-hint {
      font-size: 0.85rem;
      color: #6b6459;
      margin-bottom: 12px;
      display: none;
    }

    /* ============ MOBILE ============ */
    @media (max-width: 720px) {
      .projects.misc {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      body {
        font-size: 16px;
      }

      .site-header {
        padding: 40px 0 30px;
      }

      .site-header h1 {
        font-size: 1.7rem;
      }

      .project,
      .featured .project {
        padding: 22px;
      }

      .scan-main h3 {
        font-size: 1.25rem;
      }

      .scan-grid.has-metric {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .metric-stat {
        border-left: none;
        border-top: 1px solid var(--border);
        padding: 14px 0 0;
        max-width: none;
      }

      .metric-stat .metric-value {
        font-size: 1.8rem;
      }

      .stack>div {
        grid-template-columns: 1fr;
        gap: 2px;
      }

      .dialog-hint {
        display: block;
      }
    }
  </style>
</head>

    function renderStack(stack) {
      if (!stack) return "";
      const rows = STACK_GROUPS
        .filter(([key]) => Array.isArray(stack[key]) && stack[key].length)
        .map(([key, label]) => `<div><dt>${label}</dt><dd>${stack[key].map(esc).join(", ")}</dd></div>`)
        .join("");
      return rows ? `<div class="tier-block"><h3 class="tier-heading">Stack</h3><dl class="stack">${rows}</dl></div>` : "";
    }

    function renderProject(p) {
      const metric = p.impactMetric
        ? `<aside class="metric-stat" aria-label="Impact metric"><span class="metric-value">${esc(p.impactMetric.value)}</span><span class="metric-label">${esc(p.impactMetric.label)}</span></aside>`
        : "";

      const live = p.liveUrl
        ? `<a class="pill live-link" href="${esc(p.liveUrl)}" target="_blank" rel="noopener">Visit live ↗</a>`
        : (p.liveUrlLabel ? `<span class="live-none">${esc(p.liveUrlLabel)}</span>` : "");

      const repo = p.repoUrl ? `<a class="pill repo-link" href="${esc(p.repoUrl)}" target="_blank" rel="noopener">Code</a>` : "";

      const hasTier3 = Boolean(p.architectureDiagram || (p.learnings && p.learnings.length));
      const tier3Label = p.architectureDiagram ? "Architecture &amp; learnings <span aria-hidden=\"true\">↓</span>" : "Learnings <span aria-hidden=\"true\">↓</span>";

      const tease = (hasTier3 && p.highlights && p.highlights.length) ? `
        <button type="button" class="deep-tease" data-action="tier3" aria-expanded="false" aria-controls="tier3-${esc(p.id)}">
          <span aria-hidden="true">↳</span> ${p.highlights.map(esc).join(" · ")} — <span class="tease-cta">${p.architectureDiagram ? "explore the system design →" : "read the learnings →"}</span>
        </button>` : "";

      const diagram = p.architectureDiagram ? `
    <figure class="diagram-figure">
      <div role="img" aria-label="Architecture diagram for ${esc(p.name)}">${p.architectureDiagram}</div>
      <figcaption class="diagram-caption">
        <span>Architecture — ${esc(p.name)}</span>
        <button type="button" class="fullscreen-btn" data-action="fullscreen" data-id="${esc(p.id)}">View full screen</button>
      </figcaption>
    </figure>` : "";

      const learnings = (p.learnings && p.learnings.length) ? `
    <div class="learnings">
      <h3 class="tier-heading">Learnings</h3>
      <ul>${p.learnings.map((l) => `<li><strong>${esc(l.title)}</strong> ${esc(l.body)}</li>`).join("")}</ul>
    </div>` : "";

      const metaBits = p.role ? esc(p.role) : "";

      return `
  <li>
    <article class="project" id="project-${esc(p.id)}" data-id="${esc(p.id)}">
      <div class="scan-grid${p.impactMetric ? " has-metric" : ""}">
        <div class="scan-main">
          <div class="eyebrow">
            <span>${esc(p.year)}</span>
            ${p.status ? `<span class="sep">·</span><span class="status-live">${esc(p.status)}</span>` : ""}
            ${(p.tags && p.tags.length) ? `<span class="sep">·</span>${p.tags.slice(0, 3).map((t) => `<span class="tag">${esc(t)}</span>`).join("")}` : ""}
          </div>
          <h3>${esc(p.name)}</h3>
          <div class="story-block">
            <span class="story-label">Before</span>
            <p class="problem">${esc(p.problem)}</p>
          </div>
          <div class="story-block">
            <span class="story-label">What I built</span>
            <p class="impact">${esc(p.impact)}</p>
          </div>
          ${tease}
        </div>
        ${metric}
      </div>
      <div class="row-actions">
        ${live}
        ${repo}
        <button type="button" class="pill toggle" data-action="tier2" aria-expanded="false" aria-controls="tier2-${esc(p.id)}"><span class="chev">▸</span> Overview &amp; stack</button>
        ${hasTier3 ? `<button type="button" class="pill toggle" data-action="tier3" aria-expanded="false" aria-controls="tier3-${esc(p.id)}"><span class="chev">▸</span> ${tier3Label}</button>` : ""}
      </div>
      <div class="tier2" id="tier2-${esc(p.id)}">
        <div class="tier-inner"><div class="tier-body">
          ${p.overview ? `<div class="tier-block"><h3 class="tier-heading">Overview</h3><p>${esc(p.overview)}</p></div>` : ""}
          ${p.solution ? `<div class="tier-block"><h3 class="tier-heading">Solution</h3><p>${esc(p.solution)}</p></div>` : ""}
          ${renderStack(p.techStack)}
          ${metaBits ? `<p class="meta-line">${metaBits}</p>` : ""}
        </div></div>
      </div>
      ${hasTier3 ? `
      <div class="tier3" id="tier3-${esc(p.id)}">
        <div class="tier-inner"><div class="tier-body">
          ${diagram}
          ${learnings}
        </div></div>
      </div>` : ""}
    </article>
  </li>`;
    }

    const sorted = projects.slice().sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0) || b.year - a.year);
    document.getElementById("featured-list").innerHTML = sorted.filter((p) => p.featured).map(renderProject).join("");
    document.getElementById("misc-list").innerHTML = sorted.filter((p) => !p.featured).map(renderProject).join("");

    // ============ INTERACTIONS ============
    document.getElementById("main").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-action]");
      if (!btn) return;
      const article = btn.closest(".project");
      const action = btn.dataset.action;

      if (action === "tier2" || action === "tier3") {
        // A tier can have two triggers (pill + tease line) — keep both in sync.
        const setTier = (tier, open) => {
          article.classList.toggle(tier === "tier2" ? "t2-open" : "t3-open", open);
          article.querySelectorAll(`button[data-action="${tier}"]`).forEach((b) => b.setAttribute("aria-expanded", String(open)));
        };
        if (action === "tier2") {
          // Overview & stack expands the full card, architecture diagram included.
          const open = !article.classList.contains("t2-open");
          setTier("tier2", open);
          if (article.querySelector(".tier3")) setTier("tier3", open);
        } else {
          const open = !article.classList.contains("t3-open");
          setTier("tier3", open);
          // Expanding the deep dive also pins the overview layer open so context reads top-down.
          if (open && !article.classList.contains("t2-open")) setTier("tier2", true);
        }
      }

      if (action === "fullscreen") {
        const project = projects.find((p) => p.id === btn.dataset.id);
        if (!project || !project.architectureDiagram) return;
        document.getElementById("dialog-title").textContent = project.name;
        document.getElementById("dialog-svg-slot").innerHTML = project.architectureDiagram;
        document.getElementById("diagram-dialog").showModal();
      }
    });

    const dialog = document.getElementById("diagram-dialog");
    document.getElementById("dialog-close").addEventListener("click", () => dialog.close());
    dialog.addEventListener("click", (e) => { if (e.target === dialog) dialog.close(); });
    dialog.addEventListener("close", () => { document.getElementById("dialog-svg-slot").innerHTML = ""; });

    // ============ THEME TOGGLE ============
    const themeBtn = document.getElementById("theme-toggle");
    function syncThemeBtn() {
      const dark = document.documentElement.classList.contains("dark");
      themeBtn.textContent = dark ? "◑ light" : "◐ dark";
      themeBtn.setAttribute("aria-pressed", String(dark));
    }
    themeBtn.addEventListener("click", () => {
      const dark = document.documentElement.classList.toggle("dark");
      try { localStorage.setItem("theme", dark ? "dark" : "light"); } catch (e) { }
      syncThemeBtn();
    });
    syncThemeBtn();
  </script>
</body>

</html>
