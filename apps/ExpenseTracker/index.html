<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Ledger</title>
  <meta name="description" content="A calm, fast personal expense tracker.">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0B0B0D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ledger">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">

  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <!-- ─────────────  AUTH  ───────────── -->
  <div id="auth-container">
    <div class="auth-shell">
      <div class="auth-brand">
        <div class="auth-mark" aria-hidden="true">
          <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
            <circle cx="15" cy="15" r="11" stroke="rgba(255,255,255,0.12)" stroke-width="2.4"/>
            <path d="M15 4a11 11 0 0 1 8.6 17.8" stroke="#8FAFD8" stroke-width="2.4" stroke-linecap="round"/>
            <circle cx="23.6" cy="21.8" r="2.6" fill="#8FAFD8"/>
          </svg>
        </div>
        <div class="auth-title">Ledger</div>
        <div class="auth-sub">A calm way to track what you spend.</div>
      </div>

      <form id="login-form" class="auth-form" autocomplete="on">
        <input type="email" id="login-email" class="auth-input" placeholder="Email" autocomplete="email" required>
        <input type="password" id="login-password" class="auth-input" placeholder="Password" autocomplete="current-password" required>
        <button type="submit" id="login-btn" class="btn btn--primary btn--block">Log in</button>
        <p class="auth-switch">New here? <span id="show-signup" role="button" tabindex="0">Create account</span></p>
      </form>

      <form id="signup-form" class="auth-form hidden" autocomplete="on">
        <input type="text" id="signup-name" class="auth-input" placeholder="Your name" autocomplete="name" required>
        <input type="email" id="signup-email" class="auth-input" placeholder="Email" autocomplete="email" required>
        <input type="password" id="signup-password" class="auth-input" placeholder="Password (min 6 characters)" autocomplete="new-password" required>
        <button type="submit" id="signup-btn" class="btn btn--primary btn--block">Create account</button>
        <p class="auth-switch">Already have an account? <span id="show-login" role="button" tabindex="0">Log in</span></p>
      </form>

      <div id="auth-error" class="auth-error" hidden></div>
    </div>
  </div>

  <!-- ─────────────  APP  ───────────── -->
  <div id="app" class="hidden">
    <main id="screens">
      <section id="screen-dashboard" class="screen is-active" data-tab="dashboard"></section>
      <section id="screen-add"       class="screen"           data-tab="add"></section>
      <section id="screen-history"   class="screen"           data-tab="history"></section>
      <section id="screen-insights"  class="screen"           data-tab="insights"></section>
      <section id="screen-settings"  class="screen screen--pushed" data-tab="settings"></section>
    </main>

    <nav id="tabbar" aria-label="Primary">
      <button class="tab is-active" data-goto="dashboard" aria-label="Home">
        <svg width="24" height="24" viewBox="0 0 22 22" fill="none"><path d="M4 9.5L11 3.5l7 6V18a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
        <span>Home</span>
      </button>
      <button class="tab" data-goto="add" aria-label="Add expense">
        <svg width="24" height="24" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="8.2" stroke="currentColor" stroke-width="1.6"/><path d="M11 7.5v7M7.5 11h7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <span>Add</span>
      </button>
      <button class="tab" data-goto="history" aria-label="History">
        <svg width="24" height="24" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="8.2" stroke="currentColor" stroke-width="1.6"/><path d="M11 6.8V11l3 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>History</span>
      </button>
      <button class="tab" data-goto="insights" aria-label="Insights">
        <svg width="24" height="24" viewBox="0 0 22 22" fill="none"><path d="M3.5 15.5l4.5-5 3.5 3 6.5-8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Insights</span>
      </button>
    </nav>
  </div>

  <!-- overlay hosts -->
  <div id="sheet-host"></div>
  <div id="dialog-host"></div>
  <div id="toast-host" aria-live="polite"></div>

  <!-- ─────────────  Firebase (same project as Workout Tracker)  ───────────── -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB-F0C8l_fOhJPpkYsL6Eb6P7GUFcaC9MQ",
      authDomain: "portfolio-415e1.firebaseapp.com",
      databaseURL: "https://portfolio-415e1-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "portfolio-415e1",
      storageBucket: "portfolio-415e1.firebasestorage.app",
      messagingSenderId: "959081513500",
      appId: "1:959081513500:web:e1889367df9e24f25355d9"
    };
    firebase.initializeApp(firebaseConfig);
    window.auth = firebase.auth();
    window.database = firebase.database();
    // Keep the session on this device across app launches.
    try { window.auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL); } catch (e) {}
  </script>

  <!-- ─────────────  App  ───────────── -->
  <script src="/js/format.js"></script>
  <script src="/js/categories.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/add.js"></script>
  <script src="/js/history.js"></script>
  <script src="/js/insights.js"></script>
  <script src="/js/settings.js"></script>
  <script src="/js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
